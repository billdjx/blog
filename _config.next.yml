# NexT Theme Configuration

# Scheme
#scheme: Muse
#scheme: Mist
#scheme: Pisces
scheme: Gemini

# Dark Mode
darkmode: true

# Menu
menu:
  home: / || fa fa-home
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive
  about: /about/ || fa fa-user

menu_settings:
  icons: true
  badges: false

# Sidebar
sidebar:
  position: left
  display: post
  padding: 18
  offset: 12
  # Follow theme automatically
  width_expanded: 320

# Avatar
avatar:
  url: #/images/avatar.png
  rounded: true
  rotated: false

# Social Links
social:
  GitHub: https://github.com/yourname || fab fa-github
  E-Mail: mailto:yourname@gmail.com || fa fa-envelope

social_icons:
  enable: true
  icons_only: false
  transition: true

# Table of Contents
toc:
  enable: true
  number: true
  wrap: false
  expand_all: false
  max_depth: 6

# Creative Commons
creative_commons:
  license: by-nc-sa
  size: small
  sidebar: true
  post: true
  language:

# Footer
footer:
  since: 2026
  icon:
    enable: true
    name: fa fa-heart
    animated: true
    color: "#ff0000"
  powered: true

# Post meta
post_meta:
  item_text: true
  created_at: true
  updated_at: true
  categories: true

# Post edit
post_edit:
  enable: true
  url: https://github.com/yourname/blog/tree/main/source/_posts/

# Code block theme
codeblock:
  # Available values: https://theme-next.js.org/highlight/
  theme:
    light: default
    dark: stackoverflow-dark
  # Mac style code block
  border_radius: 6px
  copy_button:
    enable: true
    # Available values: mac | flat
    style: mac

# Reading progress bar
reading_progress:
  enable: true
  color: "#1890ff"

# Back to top
back2top:
  enable: true
  sidebar: false
  scrollpercent: true

# Bookmark
bookmark:
  enable: true
  color: "#222"
  save: auto

# Local Search
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 3
  show_result_count: true
